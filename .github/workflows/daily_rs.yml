name: 每日 RS 排行自動更新

on:
  # 台股收盤後自動執行（UTC 08:35 = 台灣 16:35）
  schedule:
    - cron: "35 8 * * 1-5"   # 週一至週五

  # 推送到 master 自動觸發
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'

  # 手動觸發（方便測試）
  workflow_dispatch:
    inputs:
      workers:
        description: "並行執行緒數（預設 12）"
        default: "12"
        required: false

permissions:
  contents: write   # 允許 commit rs_data.json 回 repo
  pages: write      # 允許部署 GitHub Pages
  id-token: write   # 官方部署必要

jobs:
  calculate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. 設定 Python ───────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. 安裝套件 ──────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3.5. 還原收盤價快取 ──────────────────────────────────
      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache.pkl
          key: price-cache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      # ── 3.7. 檢查今日資料是否已存在（push 觸發才檢查）────────
      - name: Check if today's data exists
        id: check_date
        run: |
          TODAY=$(TZ=Asia/Taipei date '+%Y-%m-%d')
          NOW_HOUR=$(TZ=Asia/Taipei date '+%H')
          LAST=$(python3 -c "import json; print(json.load(open('docs/rs_data.json')).get('updated_at','')[:10])" 2>/dev/null || echo "none")
          LAST_HOUR=$(python3 -c "import json; t=json.load(open('docs/rs_data.json')).get('updated_at','00:00'); print(t[11:13])" 2>/dev/null || echo "0")
          echo "today=$TODAY  last=$LAST  last_hour=$LAST_HOUR  now_hour=$NOW_HOUR  event=${{ github.event_name }}"
          # push 觸發：當天已有收盤後資料（14:00 以後）才跳過
          if [ "$LAST" = "$TODAY" ] && [ "$LAST_HOUR" -ge "14" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "今日收盤後資料已存在，跳過計算"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 4. 執行 RS 計算 ───────────────────────────────────────
      - name: Run RS calculator
        if: steps.check_date.outputs.skip != 'true'
        run: |
          WORKERS=${{ github.event.inputs.workers || '12' }}
          python rs_calculator.py --workers $WORKERS
        env:
          PYTHONUNBUFFERED: "1"

      # ── 5. Commit & Push rs_data.json ─────────────────────────
      - name: Commit updated data
        if: steps.check_date.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/rs_data.json /tmp/rs_data_new.json
          git fetch origin master
          git reset --hard origin/master
          cp /tmp/rs_data_new.json docs/rs_data.json
          git add docs/rs_data.json
          # 只有資料有變動才 commit
          git diff --staged --quiet || \
            git commit -m "🤖 RS 排行更新 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          git push

      # ── 6. 上傳 Pages Artifact ────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      # ── 7. Deploy GitHub Pages（官方方式）────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
