name: Daily Taiwan US RS Ranking

on:
  schedule:
    # Taiwan time 17:05, Monday-Friday.
    - cron: "5 9 * * 1-5"
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      markets:
        description: "Markets: tw,us / tw / us"
        default: "tw,us"
        required: false
      tw_boards:
        description: "Taiwan boards: listed,otc"
        default: "listed"
        required: false
      us_universe:
        description: "US universe: all or sp500"
        default: "all"
        required: false
      min_us_market_cap:
        description: "Minimum US market cap in USD; 0 means no filter"
        default: "0"
        required: false
      tw_limit:
        description: "Taiwan symbol limit for testing; 0 means no limit"
        default: "0"
        required: false
      us_limit:
        description: "US symbol limit for testing; 0 means no limit"
        default: "0"
        required: false
      backfill_history:
        description: "Force rebuilding rs_history.json: true/false"
        default: "false"
        required: false
      history_days:
        description: "Benchmark sessions to backfill"
        default: "90"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  calculate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RS calculator
        run: |
          MARKETS="${{ github.event.inputs.markets || 'tw,us' }}"
          TW_BOARDS="${{ github.event.inputs.tw_boards || 'listed' }}"
          US_UNIVERSE="${{ github.event.inputs.us_universe || 'all' }}"
          MIN_US_MARKET_CAP="${{ github.event.inputs.min_us_market_cap || '0' }}"
          TW_LIMIT="${{ github.event.inputs.tw_limit || '0' }}"
          US_LIMIT="${{ github.event.inputs.us_limit || '0' }}"
          BACKFILL_HISTORY="${{ github.event.inputs.backfill_history || 'false' }}"
          HISTORY_DAYS="${{ github.event.inputs.history_days || '90' }}"
          EXTRA=""
          [ "$BACKFILL_HISTORY" = "true" ] && EXTRA="--backfill-history"

          python rs_calculator.py \
            --markets "$MARKETS" \
            --tw-boards "$TW_BOARDS" \
            --us-universe "$US_UNIVERSE" \
            --min-us-market-cap "$MIN_US_MARKET_CAP" \
            --tw-limit "$TW_LIMIT" \
            --us-limit "$US_LIMIT" \
            --history-days "$HISTORY_DAYS" \
            $EXTRA
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rs_data.json docs/rs_history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Taiwan US RS data $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
